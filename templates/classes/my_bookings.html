{% extends "base.html" %}

{% block content %}
<h2>My Bookings</h2>

{% if bookings %}
    {% for booking in bookings %}
        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ booking.gym_class.name }}</h5>
                <p>{{ booking.gym_class.description }}</p>
                <p><strong>Date:</strong> {{ booking.gym_class.date }}</p>
            </div>
        </div>
    {% endfor %}
{% else %}
    <p>You have no bookings yet.</p>
{% endif %}
{% endblock %}
