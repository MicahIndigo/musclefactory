{% extends "base.html" %}

{% block content %}
<h2>My Bookings</h2>

{% if bookings %}
    {% for booking in bookings %}
        <div style="border:1px solid 3ccc; padding:10px; margin-bottom:10px;">
            <h3>{{ booking.gym_class.name }}</h3>
            <p><strong>Date:</strong> {{ booking.gym_class.date }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>You have no bookings yet.</p>
{% endif %}
{% endblock %}
